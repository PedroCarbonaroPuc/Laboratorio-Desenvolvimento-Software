micronaut:
  application:
    name: rent-a-car
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        ui:
          allowed-origins:
            - http://localhost:5173
            - http://localhost:3000
            - http://localhost
          allowed-methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          allowed-headers:
            - "*"
          allow-credentials: true
          max-age: 3600
  security:
    authentication: bearer
    intercept-url-map:
      - pattern: /api/auth/**
        http-method: POST
        access:
          - isAnonymous()
    token:
      bearer:
        enabled: true

mongodb:
  uri: mongodb://localhost:27017/rentacar

