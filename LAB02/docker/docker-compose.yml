services:
  mongodb:
    image: mongo:7
    container_name: rentacar-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - rentacar-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rentacar-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/rentacar
      JWT_SECRET: s3cr3tK3yF0rD3vEl0pm3ntT3st1ngPurp0s3sOnlyCh4ng3InPr0d
      JWT_EXPIRATION: "86400000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rentacar-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rentacar-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rentacar-net

volumes:
  mongo-data:

networks:
  rentacar-net:
    driver: bridge
