<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:32px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(2,6,23,0.08);">
                <tr>
                    <td style="background:linear-gradient(135deg,#f59e0b,#ef4444);padding:32px;text-align:center;">
                        <h1 style="margin:0;color:#ffffff;font-size:24px;">🏢 Conferência de Resgate</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px;">
                        <h2 style="margin:0 0 12px;color:#0f172a;">Um aluno resgatou uma vantagem</h2>
                        <p style="color:#334155;font-size:15px;line-height:1.6;">
                            Olá, <strong th:text="${nomeEmpresa}">Empresa</strong>!
                        </p>
                        <p style="color:#334155;font-size:15px;line-height:1.6;">
                            O aluno <strong th:text="${nomeAluno}">Aluno</strong> resgatou a vantagem
                            <strong th:text="${nomeVantagem}">Vantagem</strong>.
                        </p>
                        <div style="margin:24px 0;text-align:center;">
                            <p style="color:#64748b;font-size:13px;margin:0 0 8px;">CÓDIGO PARA CONFERÊNCIA</p>
                            <div style="display:inline-block;padding:16px 32px;background:#fef2f2;border:2px dashed #ef4444;border-radius:12px;">
                                <span style="font-size:28px;font-weight:bold;letter-spacing:4px;color:#b91c1c;" th:text="${codigo}">XXXX-XXXX</span>
                            </div>
                        </div>
                        <p style="color:#64748b;font-size:13px;margin-top:24px;">
                            Confira este código no momento da troca presencial para validar o resgate.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="background:#0f172a;padding:20px;text-align:center;">
                        <p style="margin:0;color:#94a3b8;font-size:12px;">Sistema de Moeda Estudantil · PUC Minas</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
