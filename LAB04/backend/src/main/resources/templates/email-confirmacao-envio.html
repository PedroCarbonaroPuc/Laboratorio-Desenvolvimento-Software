<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:32px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(2,6,23,0.08);">
                <tr>
                    <td style="background:linear-gradient(135deg,#0ea5e9,#6366f1);padding:32px;text-align:center;">
                        <h1 style="margin:0;color:#ffffff;font-size:24px;">🪙 Moeda Estudantil</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px;">
                        <h2 style="margin:0 0 12px;color:#0f172a;">Envio confirmado ✅</h2>
                        <p style="color:#334155;font-size:15px;line-height:1.6;">
                            Olá, <strong th:text="${nomeProfessor}">Professor</strong>!
                        </p>
                        <p style="color:#334155;font-size:15px;line-height:1.6;">
                            Você enviou <strong th:text="${quantidade}">0</strong> moedas para
                            <strong th:text="${nomeAluno}">Aluno</strong> com sucesso.
                        </p>
                        <table width="100%" cellpadding="0" cellspacing="0" style="margin:20px 0;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;">
                            <tr><td style="padding:16px 20px;color:#475569;font-size:14px;">
                                <strong>Mensagem enviada:</strong>
                                <span th:text="${mensagem}">Mensagem</span>
                            </td></tr>
                        </table>
                        <p style="color:#334155;font-size:15px;">
                            Seu saldo restante é de <strong th:text="${saldoAtual}">0</strong> moedas.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="background:#0f172a;padding:20px;text-align:center;">
                        <p style="margin:0;color:#94a3b8;font-size:12px;">Sistema de Moeda Estudantil · PUC Minas</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
