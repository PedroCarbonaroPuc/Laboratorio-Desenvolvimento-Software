<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
</head>
<body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;padding:24px 0;">
    <tr>
        <td align="center">
            <table width="520" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;">
                <tr>
                    <td style="background:#0f172a;padding:18px 24px;">
                        <h1 style="margin:0;color:#ffffff;font-size:18px;">Seu cupom foi gerado</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:22px 24px;">
                        <p style="margin:0 0 12px;color:#334155;font-size:14px;line-height:1.6;">
                            Olá, <strong th:text="${nomeAluno}">Aluno</strong>. Você resgatou a vantagem
                            <strong th:text="${nomeVantagem}">Vantagem</strong>.
                        </p>
                        <div style="margin:14px 0 18px;text-align:center;">
                            <p style="margin:0 0 6px;color:#64748b;font-size:12px;">CODIGO DO CUPOM</p>
                            <div style="display:inline-block;padding:12px 20px;background:#ecfeff;border:1px dashed #0891b2;border-radius:10px;">
                                <span style="font-size:24px;font-weight:bold;letter-spacing:3px;color:#0f766e;" th:text="${codigo}">XXXX-XXXX</span>
                            </div>
                        </div>
                        <p style="margin:0 0 6px;color:#334155;font-size:14px;">
                            Custo: <strong th:text="${custoMoedas}">0</strong> moedas ·
                            Saldo atual: <strong th:text="${saldoAtual}">0</strong> moedas.
                        </p>
                        <p style="margin:0;color:#64748b;font-size:12px;">
                            Apresente este codigo no parceiro para utilizar a vantagem.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
