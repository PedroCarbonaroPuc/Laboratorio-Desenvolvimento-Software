spring.application.name=moeda-estudantil-backend
server.port=${SERVER_PORT:8080}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/moeda_estudantil}
spring.data.mongodb.auto-index-creation=true

app.security.token-hours=${APP_SECURITY_TOKEN_HOURS:24}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
app.email.mock-enabled=${APP_EMAIL_MOCK_ENABLED:true}
app.allocation.cron=${APP_ALLOCATION_CRON:0 0 6 * * *}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:no-reply@moedaestudantil.local}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}
