services:
  mongodb:
    image: mongo:7
    container_name: moeda-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: moeda_estudantil
    ports:
      - "27017:27017"
    volumes:
      - moeda_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - moeda-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: moeda-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/moeda_estudantil
      APP_EMAIL_MOCK_ENABLED: "true"
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - moeda-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: moeda-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - moeda-net

volumes:
  moeda_mongo_data:

networks:
  moeda-net:
    driver: bridge
